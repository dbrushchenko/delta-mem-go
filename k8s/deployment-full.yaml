apiVersion: apps/v1
kind: Deployment
metadata:
  name: delta-mem-go
  namespace: mesh
  labels:
    app: delta-mem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delta-mem
  template:
    metadata:
      labels:
        app: delta-mem
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: delta-mem
        image: code.usgs.gov:5050/daniel_brushchenko/mem-go:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: ORT_LIB_DIR
          value: "/usr/local/lib"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: data
          mountPath: /data
        - name: models
          mountPath: /models
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: delta-mem-data
      - name: models
        persistentVolumeClaim:
          claimName: delta-mem-models
---
apiVersion: v1
kind: Service
metadata:
  name: delta-mem
  namespace: mesh
spec:
  selector:
    app: delta-mem
  ports:
  - name: http
    port: 8080
  - name: grpc
    port: 9090
