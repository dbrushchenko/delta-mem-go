syntax = "proto3";

package deltamem;

option go_package = "github.com/dbrushchenko/delta-mem-go/proto";

service DeltaMem {
  // Original δ-mem methods (kept for backward compatibility)
  rpc Store(StoreRequest) returns (StoreResponse);
  rpc Recall(RecallRequest) returns (RecallResponse);
  rpc StoreHidden(HiddenStoreRequest) returns (StoreResponse);
  rpc RecallHidden(HiddenRecallRequest) returns (HiddenRecallResponse);
  rpc Health(Empty) returns (HealthResponse);
  rpc ResetState(OwnerRequest) returns (Empty);

  // New methods — fully exposed (nomic + IBNN + turbovec + Gemma 4 QAT)
  rpc IBNNForward(IBNNForwardRequest) returns (IBNNForwardResponse);
  rpc IBNNForwardHidden(IBNNForwardHiddenRequest) returns (IBNNForwardResponse);
  rpc TurboAdd(TurboAddRequest) returns (TurboAddResponse);
  rpc TurboSearch(TurboSearchRequest) returns (TurboSearchResponse);
  rpc Generate(GenerateRequest) returns (GenerateResponse);

  // Thoughts — novel idea synthesis
  rpc Think(ThinkRequest) returns (ThinkResponse);
  rpc StartWander(OwnerRequest) returns (Empty);
  rpc StopWander(OwnerRequest) returns (Empty);
  rpc HarvestWander(OwnerRequest) returns (HarvestResponse);
  rpc AddAxiom(AxiomRequest) returns (Empty);
  rpc Adapt(AdaptRequest) returns (AdaptResponse);
  rpc Learn(LearnRequest) returns (Empty);
  rpc Forget(ForgetRequest) returns (Empty);

  // Full-pipeline RPCs — all layers wired
  rpc StoreDeep(StoreRequest) returns (StoreDeepResponse);
  rpc TurbogoSearch(TurboSearchRequest) returns (TurboSearchResponse);
  rpc SessionSearch(SessionSearchRequest) returns (TurboSearchResponse);
  rpc Validate(ValidateRequest) returns (ValidateResponse);
  rpc QueryTemporal(TemporalRequest) returns (TemporalResponse);
  rpc AmIConfident(ConfidenceRequest) returns (ConfidenceResponse);
}

// Original messages (unchanged)
message StoreRequest {
  string owner = 1;
  string key = 2;
  string content = 3;
}

message StoreResponse {
  bool ok = 1;
  float state_norm = 2;
}

message RecallRequest {
  string owner = 1;
  string query = 2;
}

message RecallResponse {
  repeated float correction = 1;
  float confidence = 2;
}

message HiddenStoreRequest {
  string owner = 1;
  repeated float hidden_state = 2;
}

message HiddenRecallRequest {
  string owner = 1;
  repeated float query_state = 2;
}

message HiddenRecallResponse {
  repeated float delta_q = 1;
  repeated float delta_o = 2;
  float confidence = 3;
}

message HealthResponse {
  int32 owners_active = 1;
  float avg_state_norm = 2;
  int64 total_stores = 3;
  int64 total_recalls = 4;
  string uptime = 5;
}

message OwnerRequest {
  string owner = 1;
}

message Empty {}

// New messages for IBNN, turbovec, Gemma 4 QAT
message IBNNForwardRequest {
  string owner = 1;
  string text = 2;
}

message IBNNForwardHiddenRequest {
  string owner = 1;
  repeated float hidden_state = 2;
}

message IBNNForwardResponse {
  repeated float output = 1;
  int32 dim = 2;
}

message TurboAddRequest {
  string owner = 1;
  string id = 2;
  repeated float vector = 3;
}

message TurboAddResponse {
  bool ok = 1;
}

message TurboSearchRequest {
  string owner = 1;
  repeated float query = 2;
  int32 k = 3;
}

message TurboSearchResponse {
  repeated string ids = 1;
  repeated float scores = 2;
}

message GenerateRequest {
  string owner = 1;
  string prompt = 2;
}

message GenerateResponse {
  string response = 1;
}


message ThinkRequest {
  string owner = 1;
  repeated string seeds = 2;
}

message ThinkResponse {
  string idea = 1;
  repeated string seeds = 2;
  repeated string neighbors = 3;
  float confidence = 4;
  float novelty = 5;
  float grounding = 6;
  int32 depth = 7;
  bool valid = 8;
}

message HarvestResponse {
  repeated ThinkResponse thoughts = 1;
}

message AxiomRequest {
  string statement = 1;
  string domain = 2;
}

message AdaptRequest {
  string owner = 1;
  string wrong = 2;
  string right = 3;
}

message AdaptResponse {
  float impact = 1;
}

message LearnRequest {
  string owner = 1;
  string fact = 2;
}

message ForgetRequest {
  string owner = 1;
  string what = 2;
}

// StoreDeep response — includes all layer feedback
message StoreDeepResponse {
  bool ok = 1;
  float state_norm = 2;        // δ-mem norm after store
  float ibnn_reinforced = 3;   // IBNN learning rate applied
  string turbogo_id = 4;       // ID in turbogo index
  string turbovec_id = 5;      // ID in turbovec index
}

// Truth validation
message ValidateRequest {
  string owner = 1;
  string statement = 2;
}

message ValidateResponse {
  bool valid = 1;
  float grounding = 2;
  float coherence = 3;
  string reason = 4;
  repeated string contradictions = 5;
}

// Temporal query
message TemporalRequest {
  string owner = 1;
  int32 limit = 2;
}

message TemporalResponse {
  repeated TemporalEvent events = 1;
}

message TemporalEvent {
  string id = 1;
  string content = 2;
  string when = 3;
}

// Self-model confidence
message ConfidenceRequest {
  string owner = 1;
  string text = 2;
}

// Session-aware search
message SessionSearchRequest {
  string owner = 1;
  repeated float query = 2;
  int32 k = 3;
  string session_id = 4;    // client-provided or auto-generated
  string session_type = 5;  // hook-light, hook-standard, hook-deep, agent-mcp, cli
}

message ConfidenceResponse {
  int32 level = 1;         // 0=NeverSeen, 1=Low, 2=Medium, 3=High
  float raw_score = 2;
}
